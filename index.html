<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nash Hub - Key System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            width: 100%;
        }

        .key-card {
            background: rgba(15, 25, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .logo h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo p {
            color: #8899aa;
            font-size: 14px;
            margin-top: 5px;
        }

        .key-display {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 25px;
            margin: 30px 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .key-label {
            color: #8899aa;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .key-value {
            background: #0a0e1a;
            border-radius: 12px;
            padding: 18px 20px;
            font-family: 'Courier New', monospace;
            font-size: 22px;
            font-weight: bold;
            color: #4ade80;
            letter-spacing: 1px;
            word-break: break-all;
            border: 1px solid #2a3a4a;
            margin-bottom: 20px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px -5px rgba(74, 222, 128, 0.3);
        }

        .copy-btn.copied {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }

        .info-box {
            background: rgba(74, 222, 128, 0.1);
            border-radius: 12px;
            padding: 15px;
            margin-top: 20px;
            border-left: 3px solid #4ade80;
            text-align: left;
        }

        .info-box p {
            color: #aabbcc;
            font-size: 13px;
            line-height: 1.6;
        }

        .info-box strong {
            color: #4ade80;
        }

        .footer {
            margin-top: 25px;
            color: #667788;
            font-size: 12px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="key-card">
            <div class="logo">
                <h1>🔑 Nash Hub</h1>
                <p>Key System • Secure Access</p>
            </div>

            <div class="key-display">
                <div class="key-label">YOUR LICENSE KEY</div>
                <div class="key-value" id="keyValue">NashHub-Script</div>
                <button class="copy-btn" id="copyBtn" onclick="copyKey()">
                    📋 Copy Key
                </button>
            </div>

            <div class="info-box">
                <p>
                    <strong>📌 How to use:</strong><br>
                    1. Click "Copy Key" to copy the key above<br>
                    2. Open Roblox and run the Nash Hub script<br>
                    3. Paste the key when prompted (Ctrl + V)<br>
                    4. Enjoy Nash Hub!
                </p>
            </div>

            <div class="footer">
                Nash Hub Script • Premium Quality
            </div>
        </div>
    </div>

    <script>
        const FIXED_KEY = "NashHub-Script";
        
        function copyKey() {
            navigator.clipboard.writeText(FIXED_KEY).then(() => {
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.innerHTML = '✅ Copied!';
                copyBtn.classList.add('copied');
                
                setTimeout(() => {
                    copyBtn.innerHTML = '📋 Copy Key';
                    copyBtn.classList.remove('copied');
                }, 2000);
                
                showNotification('✅ Key copied to clipboard!', '#22c55e');
            }).catch(() => {
                showNotification('❌ Failed to copy key', '#ef4444');
            });
        }

        function showNotification(message, color) {
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.position = 'fixed';
            notification.style.bottom = '20px';
            notification.style.left = '50%';
            notification.style.transform = 'translateX(-50%)';
            notification.style.backgroundColor = color;
            notification.style.color = 'white';
            notification.style.padding = '12px 24px';
            notification.style.borderRadius = '40px';
            notification.style.fontSize = '14px';
            notification.style.fontWeight = 'bold';
            notification.style.zIndex = '1000';
            notification.style.boxShadow = '0 4px 15px rgba(0,0,0,0.2)';
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.remove();
            }, 2000);
        }
    </script>
</body>
</html>
